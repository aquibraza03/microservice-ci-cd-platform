name: Docker Build
description: Reusable composite action to build and optionally push Docker images with cache, labels, tags, and digest outputs.

inputs:
  registry:
    description: Container registry hostname (e.g. ghcr.io)
    required: true

  username:
    description: Registry username
    required: true

  password:
    description: Registry password or token
    required: true

  image_name:
    description: Full image repository path (e.g. ghcr.io/org/service)
    required: true

  image_tag:
    description: Primary image tag
    required: true

  context:
    description: Docker build context
    required: false
    default: .

  dockerfile:
    description: Dockerfile path relative to context
    required: false
    default: Dockerfile

  push:
    description: Push image to registry
    required: false
    default: "true"

  platforms:
    description: Target platforms
    required: false
    default: linux/amd64

  additional_tags:
    description: Extra newline-separated tags
    required: false
    default: ""

  build_args:
    description: Extra newline-separated build args (KEY=VALUE)
    required: false
    default: ""

  target:
    description: Target stage in multi-stage Dockerfile
    required: false
    default: ""

  provenance:
    description: Enable provenance attestation
    required: false
    default: "false"

outputs:
  image_ref:
    description: Immutable image reference using digest when available
    value: ${{ steps.outputs_step.outputs.image_ref }}

  digest:
    description: Built image digest
    value: ${{ steps.build.outputs.digest }}

  tags:
    description: Published tags
    value: ${{ steps.tags.outputs.tags }}

runs:
  using: composite
  steps:
    - name: Validate Inputs
      shell: bash
      run: |
        test -n "${{ inputs.registry }}"
        test -n "${{ inputs.username }}"
        test -n "${{ inputs.password }}"
        test -n "${{ inputs.image_name }}"
        test -n "${{ inputs.image_tag }}"

    - name: Verify Dockerfile Exists
      shell: bash
      run: |
        test -f "${{ inputs.context }}/${{ inputs.dockerfile }}"

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Build Tag List
      id: tags
      shell: bash
      run: |
        PRIMARY="${{ inputs.image_name }}:${{ inputs.image_tag }}"
        echo "$PRIMARY" > tags.txt

        if [ -n "${{ inputs.additional_tags }}" ]; then
          printf "%s\n" "${{ inputs.additional_tags }}" | while read line; do
            [ -n "$line" ] && echo "${{ inputs.image_name }}:$line" >> tags.txt
          done
        fi

        {
          echo "tags<<EOF"
          cat tags.txt
          echo "EOF"
        } >> $GITHUB_OUTPUT

    - name: Build Args List
      id: args
      shell: bash
      run: |
        {
          echo "args<<EOF"
          printf "%s\n" "${{ inputs.build_args }}"
          echo "EOF"
        } >> $GITHUB_OUTPUT

    - name: Build and Push Image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.context }}/${{ inputs.dockerfile }}
        push: ${{ inputs.push }}
        tags: ${{ steps.tags.outputs.tags }}
        build-args: ${{ steps.args.outputs.args }}
        platforms: ${{ inputs.platforms }}
        target: ${{ inputs.target }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: ${{ inputs.provenance }}

    - name: Export Outputs
      id: outputs_step
      shell: bash
      run: |
        if [ -n "${{ steps.build.outputs.digest }}" ]; then
          echo "image_ref=${{ inputs.image_name }}@${{ steps.build.outputs.digest }}" >> $GITHUB_OUTPUT
        else
          echo "image_ref=${{ inputs.image_name }}:${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
        fi

    - name: Publish Summary
      shell: bash
      run: |
        echo "## Docker Build Action" >> $GITHUB_STEP_SUMMARY
        echo "- Image: ${{ inputs.image_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- Primary Tag: ${{ inputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
        echo "- Platforms: ${{ inputs.platforms }}" >> $GITHUB_STEP_SUMMARY
        echo "- Push Enabled: ${{ inputs.push }}" >> $GITHUB_STEP_SUMMARY
        echo "- Output Ref: ${{ steps.outputs_step.outputs.image_ref }}" >> $GITHUB_STEP_SUMMARY
