name: Deploy Staging

on:
  push:
    branches:
      - main
    paths:
      - "services/**"
      - "deploy/**"
      - ".github/workflows/deploy-staging.yml"

  workflow_dispatch:
    inputs:
      service:
        description: "Specific service to deploy (optional)"
        required: false
        type: string

permissions:
  contents: read
  deployments: write
  checks: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ENVIRONMENT: staging
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:

  detect-services:
    name: Detect Services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Matrix
        id: matrix
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.service }}" ]; then
            echo 'matrix=["${{ github.event.inputs.service }}"]' >> $GITHUB_OUTPUT
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE=$(git rev-list --max-count=1 HEAD^ || true)
          fi

          CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}" | grep '^services/' | cut -d/ -f2 | sort -u || true)

          if [ -z "$CHANGED" ]; then
            CHANGED=$(find services -mindepth 1 -maxdepth 1 -type d -exec basename {} \;)
          fi

          JSON=$(printf '%s\n' "$CHANGED" | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix=$JSON" >> $GITHUB_OUTPUT

  build-and-push:
    name: Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: detect-services

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.matrix) }}

    outputs:
      image_ref: ${{ steps.capture.outputs.image_ref }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify Dockerfile
        run: test -f services/${{ matrix.service }}/Dockerfile

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ matrix.service }}:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Capture Digest
        id: capture
        run: |
          echo "image_ref=${{ env.REGISTRY }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs:
      - detect-services
      - build-and-push

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.matrix) }}

    environment:
      name: staging
      url: https://staging.example.internal

    steps:
      - uses: actions/checkout@v4

      - name: Configure Cloud Auth (OIDC Placeholder)
        run: echo "Configure AWS/GCP/Azure federation here"

      - name: Detect Deployment Target
        id: target
        shell: bash
        run: |
          if [ -f "services/${{ matrix.service }}/service.yml" ]; then
            TYPE=$(grep '^target:' services/${{ matrix.service }}/service.yml | awk '{print $2}')
            echo "type=$TYPE" >> $GITHUB_OUTPUT
          elif [ -d deploy/k8s ]; then
            echo "type=k8s" >> $GITHUB_OUTPUT
          elif [ -d deploy/ecs ]; then
            echo "type=ecs" >> $GITHUB_OUTPUT
          else
            echo "No deployment target found"
            exit 1
          fi

      - name: Deploy Generic
        run: |
          chmod +x deploy/scripts/deploy.sh
          deploy/scripts/deploy.sh \
            "${{ matrix.service }}" \
            "${{ env.ENVIRONMENT }}" \
            "${{ needs.build-and-push.outputs.image_ref }}" \
            "${{ steps.target.outputs.type }}"

      - name: Read Health Path
        id: health
        shell: bash
        run: |
          if [ -f "services/${{ matrix.service }}/service.yml" ]; then
            PATH_CHECK=$(grep '^healthcheck:' services/${{ matrix.service }}/service.yml | awk '{print $2}')
          fi

          if [ -z "$PATH_CHECK" ]; then
            PATH_CHECK="/health"
          fi

          echo "path=$PATH_CHECK" >> $GITHUB_OUTPUT

      - name: Readiness Check
        run: |
          chmod +x ci/smoke-test.sh
          ci/smoke-test.sh \
            "${{ matrix.service }}" \
            "${{ steps.health.outputs.path }}" \
            "${{ env.ENVIRONMENT }}"

      - name: Auto Rollback on Failure
        if: failure()
        run: |
          chmod +x deploy/scripts/rollback.sh
          deploy/scripts/rollback.sh \
            "${{ matrix.service }}" \
            "${{ env.ENVIRONMENT }}" \
            "${{ steps.target.outputs.type }}"

  summary:
    name: Staging Summary
    if: always()
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - deploy

    steps:
      - name: Publish Summary
        run: |
          echo "## Staging Deployment Completed" >> $GITHUB_STEP_SUMMARY
          echo "- Immutable images built" >> $GITHUB_STEP_SUMMARY
          echo "- Services deployed to staging" >> $GITHUB_STEP_SUMMARY
          echo "- Readiness checks executed" >> $GITHUB_STEP_SUMMARY
          echo "- Auto rollback enabled" >> $GITHUB_STEP_SUMMARY
