name: Security

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  checks: write
  security-events: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  TF_VERSION: "1.9.7"
  TRIVY_VERSION: "0.28.0"

jobs:

  detect-services:
    name: Detect Services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Dynamic Matrix
        id: matrix
        shell: bash
        run: |
          SERVICES=$(find services -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort)

          if [ -z "$SERVICES" ]; then
            echo 'matrix=["platform-smoke-test"]' >> $GITHUB_OUTPUT
            exit 0
          fi

          JSON=$(printf '%s\n' "$SERVICES" | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix=$JSON" >> $GITHUB_OUTPUT

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    needs: detect-services

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Node Project
        id: node
        shell: bash
        run: |
          if [ -f "services/${{ matrix.service }}/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.node.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install Dependencies
        if: steps.node.outputs.exists == 'true'
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: npm Audit
        if: steps.node.outputs.exists == 'true'
        working-directory: services/${{ matrix.service }}
        run: npm audit --audit-level=high

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript
          - python
          - go

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  container-scan:
    name: Container Scan
    runs-on: ubuntu-latest
    needs: detect-services

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Dockerfile
        id: dockerfile
        shell: bash
        run: |
          if [ -f "services/${{ matrix.service }}/Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Buildx
        if: steps.dockerfile.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build Image
        if: steps.dockerfile.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: false
          load: true
          tags: local/${{ matrix.service }}:security

      - name: Trivy Scan
        if: steps.dockerfile.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: local/${{ matrix.service }}:security
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: ${{ github.event_name == 'pull_request' && '0' || '1' }}

      - name: Upload SARIF
        if: steps.dockerfile.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  terraform-security:
    name: Terraform Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform -chdir=terraform init -backend=false

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          quiet: true
          soft_fail: ${{ github.event_name == 'pull_request' }}

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: "*.spdx.json"
          retention-days: 30

  summary:
    name: Security Summary
    if: always()
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - dependency-scan
      - codeql
      - container-scan
      - terraform-security
      - sbom

    steps:
      - name: Publish Summary
        run: |
          echo "## Security Pipeline Completed" >> $GITHUB_STEP_SUMMARY
          echo "- Secrets scanned" >> $GITHUB_STEP_SUMMARY
          echo "- Dependencies audited" >> $GITHUB_STEP_SUMMARY
          echo "- Static analysis complete" >> $GITHUB_STEP_SUMMARY
          echo "- Containers scanned" >> $GITHUB_STEP_SUMMARY
          echo "- Terraform checked" >> $GITHUB_STEP_SUMMARY
          echo "- SBOM generated" >> $GITHUB_STEP_SUMMARY
