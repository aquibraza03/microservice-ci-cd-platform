name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy (required)"
        required: true
        type: string
      image_ref:
        description: "Immutable image ref (tag or digest)"
        required: true
        type: string
      change_ticket:
        description: "Change request / ticket ID"
        required: true
        type: string
      rollout_strategy:
        description: "Deployment strategy"
        required: true
        type: choice
        options:
          - rolling
          - blue-green
          - canary

permissions:
  contents: read
  deployments: write
  checks: write
  id-token: write

concurrency:
  group: deploy-prod-${{ github.event.inputs.service }}
  cancel-in-progress: false

env:
  ENVIRONMENT: prod

jobs:

  preflight:
    name: Preflight Validation
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.target.outputs.type }}
      health_path: ${{ steps.meta.outputs.health_path }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate Service Exists
        run: |
          test -d services/${{ github.event.inputs.service }}

      - name: Validate Change Ticket Format
        shell: bash
        run: |
          echo "${{ github.event.inputs.change_ticket }}" | grep -E '^[A-Z]+-[0-9]+$'

      - name: Detect Deployment Target
        id: target
        shell: bash
        run: |
          if [ -f "services/${{ github.event.inputs.service }}/service.yml" ]; then
            TYPE=$(grep '^target:' services/${{ github.event.inputs.service }}/service.yml | awk '{print $2}')
          elif [ -d deploy/k8s ]; then
            TYPE="k8s"
          elif [ -d deploy/ecs ]; then
            TYPE="ecs"
          else
            echo "No deploy target found"
            exit 1
          fi
          echo "type=$TYPE" >> $GITHUB_OUTPUT

      - name: Read Health Path
        id: meta
        shell: bash
        run: |
          PATH_CHECK=$(grep '^healthcheck:' services/${{ github.event.inputs.service }}/service.yml | awk '{print $2}' || true)
          if [ -z "$PATH_CHECK" ]; then
            PATH_CHECK="/health"
          fi
          echo "health_path=$PATH_CHECK" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: preflight

    environment:
      name: prod
      url: https://prod.example.internal

    steps:
      - uses: actions/checkout@v4

      - name: Configure Cloud Auth (OIDC Placeholder)
        run: |
          echo "Configure AWS/GCP/Azure federation here"

      - name: Record Deployment Start
        run: |
          echo "Deploying ${{ github.event.inputs.service }}"
          echo "Image: ${{ github.event.inputs.image_ref }}"
          echo "Ticket: ${{ github.event.inputs.change_ticket }}"
          echo "Strategy: ${{ github.event.inputs.rollout_strategy }}"

      - name: Blue-Green Deploy
        if: github.event.inputs.rollout_strategy == 'blue-green'
        run: |
          chmod +x deploy/scripts/deploy.sh
          deploy/scripts/deploy.sh \
            "${{ github.event.inputs.service }}" \
            "${{ env.ENVIRONMENT }}" \
            "${{ github.event.inputs.image_ref }}" \
            "${{ needs.preflight.outputs.target }}" \
            blue-green

      - name: Canary Deploy
        if: github.event.inputs.rollout_strategy == 'canary'
        run: |
          chmod +x deploy/scripts/deploy.sh
          deploy/scripts/deploy.sh \
            "${{ github.event.inputs.service }}" \
            "${{ env.ENVIRONMENT }}" \
            "${{ github.event.inputs.image_ref }}" \
            "${{ needs.preflight.outputs.target }}" \
            canary

      - name: Rolling Deploy
        if: github.event.inputs.rollout_strategy == 'rolling'
        run: |
          chmod +x deploy/scripts/deploy.sh
          deploy/scripts/deploy.sh \
            "${{ github.event.inputs.service }}" \
            "${{ env.ENVIRONMENT }}" \
            "${{ github.event.inputs.image_ref }}" \
            "${{ needs.preflight.outputs.target }}" \
            rolling

      - name: Health Check
        run: |
          chmod +x ci/smoke-test.sh
          ci/smoke-test.sh \
            "${{ github.event.inputs.service }}" \
            "${{ needs.preflight.outputs.health_path }}" \
            "${{ env.ENVIRONMENT }}"

      - name: Auto Rollback on Failure
        if: failure()
        run: |
          chmod +x deploy/scripts/rollback.sh
          deploy/scripts/rollback.sh \
            "${{ github.event.inputs.service }}" \
            "${{ env.ENVIRONMENT }}" \
            "${{ needs.preflight.outputs.target }}"

  post-deploy:
    name: Production Summary
    if: always()
    runs-on: ubuntu-latest
    needs:
      - preflight
      - deploy

    steps:
      - name: Publish Summary
        run: |
          echo "## Production Deployment Result" >> $GITHUB_STEP_SUMMARY
          echo "- Service: ${{ github.event.inputs.service }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ github.event.inputs.image_ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- Change Ticket: ${{ github.event.inputs.change_ticket }}" >> $GITHUB_STEP_SUMMARY
          echo "- Strategy: ${{ github.event.inputs.rollout_strategy }}" >> $GITHUB_STEP_SUMMARY
          echo "- Rollback enabled on failure" >> $GITHUB_STEP_SUMMARY
