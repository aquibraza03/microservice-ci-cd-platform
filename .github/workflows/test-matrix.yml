name: Test Matrix

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "services/**"
      - "tests/**"
      - ".github/workflows/test-matrix.yml"

  push:
    branches:
      - main
      - develop
    paths:
      - "services/**"
      - "tests/**"

  workflow_dispatch:
    inputs:
      service:
        description: "Run tests for a single service (optional)"
        required: false
        type: string

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  GO_VERSION: "1.22"

jobs:

  detect-services:
    name: Detect Services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Dynamic Matrix
        id: matrix
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.service }}" ]; then
            echo 'matrix=["${{ github.event.inputs.service }}"]' >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi

          CHANGED=$(git diff --name-only "$BASE" "${{ github.sha }}" | grep '^services/' | cut -d/ -f2 | sort -u || true)

          if [ -z "$CHANGED" ]; then
            CHANGED=$(find services -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort)
          fi

          if [ -z "$CHANGED" ]; then
            echo "No services found"
            exit 1
          fi

          JSON=$(printf '%s\n' "$CHANGED" | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix=$JSON" >> $GITHUB_OUTPUT

  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: detect-services
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect Runtime
        id: runtime
        shell: bash
        run: |
          if [ -f "services/${{ matrix.service }}/package.json" ]; then
            echo "type=node" >> $GITHUB_OUTPUT
          elif [ -f "services/${{ matrix.service }}/requirements.txt" ] || [ -f "services/${{ matrix.service }}/pyproject.toml" ]; then
            echo "type=python" >> $GITHUB_OUTPUT
          elif [ -f "services/${{ matrix.service }}/go.mod" ]; then
            echo "type=go" >> $GITHUB_OUTPUT
          else
            echo "type=unknown" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Setup Node
        if: steps.runtime.outputs.type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Setup Python
        if: steps.runtime.outputs.type == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Setup Go
        if: steps.runtime.outputs.type == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Node Dependencies
        if: steps.runtime.outputs.type == 'node'
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Install Python Dependencies
        if: steps.runtime.outputs.type == 'python'
        working-directory: services/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov

      - name: Run Node Tests
        if: steps.runtime.outputs.type == 'node'
        working-directory: services/${{ matrix.service }}
        run: npm test -- --coverage

      - name: Run Python Tests
        if: steps.runtime.outputs.type == 'python'
        working-directory: services/${{ matrix.service }}
        run: pytest --cov=. --cov-report=xml

      - name: Run Go Tests
        if: steps.runtime.outputs.type == 'go'
        working-directory: services/${{ matrix.service }}
        run: go test ./... -coverprofile=coverage.out

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-${{ matrix.service }}
          path: |
            services/${{ matrix.service }}/coverage*
            services/${{ matrix.service }}/coverage.out
            services/${{ matrix.service }}/junit*.xml
          retention-days: 14

  summary:
    name: Test Summary
    if: always()
    runs-on: ubuntu-latest
    needs:
      - test

    steps:
      - name: Publish Summary
        run: |
          echo "## Test Matrix Completed" >> $GITHUB_STEP_SUMMARY
          echo "- Parallel service tests executed" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage artifacts uploaded" >> $GITHUB_STEP_SUMMARY
          echo "- Runtime auto-detection enabled" >> $GITHUB_STEP_SUMMARY
