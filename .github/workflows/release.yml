name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write
  checks: write
  pull-requests: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:

  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure Main Branch
        run: test "${GITHUB_REF_NAME}" = "main"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Determine Release Type
        id: type
        shell: bash
        run: |
          TYPE="${{ github.event.inputs.release_type }}"
          if [ -z "$TYPE" ]; then
            if git log -1 --pretty=%B | grep -q "BREAKING CHANGE"; then
              TYPE="major"
            elif git log -1 --pretty=%B | grep -q "^feat"; then
              TYPE="minor"
            else
              TYPE="patch"
            fi
          fi
          echo "type=$TYPE" >> $GITHUB_OUTPUT

      - name: Calculate Version
        id: version
        shell: bash
        run: |
          LAST_TAG=$(git tag --sort=-v:refname | head -1)
          [ -z "$LAST_TAG" ] && LAST_TAG="v0.0.0"

          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case "${{ steps.type.outputs.type }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            *) PATCH=$((PATCH+1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT

  detect-services:
    name: Detect Services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - name: Build Dynamic Matrix
        id: matrix
        shell: bash
        run: |
          SERVICES=$(find services -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort)

          if [ -z "$SERVICES" ]; then
            echo "No services found"
            exit 1
          fi

          JSON=$(printf '%s\n' "$SERVICES" | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix=$JSON" >> $GITHUB_OUTPUT

  build:
    name: Build Release (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs:
      - preflight
      - detect-services

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify Dockerfile
        run: test -f services/${{ matrix.service }}/Dockerfile

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Release Image
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ needs.preflight.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
