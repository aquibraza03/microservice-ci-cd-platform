<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pipeline Notification</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fa;
  color: #222;
  margin: 0;
  padding: 20px;
}
.container {
  max-width: 700px;
  margin: auto;
  background: #ffffff;
  border-radius: 8px;
  padding: 24px;
  border: 1px solid #e5e7eb;
}
.header {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 12px;
}
.status {
  padding: 10px 14px;
  border-radius: 6px;
  color: #ffffff;
  display: inline-block;
  margin-bottom: 18px;
}
.success { background: #16a34a; }
.failure { background: #dc2626; }
.warning { background: #d97706; }
.info { background: #2563eb; }

.section {
  margin-top: 18px;
}

.label {
  font-weight: bold;
}

.footer {
  margin-top: 30px;
  font-size: 12px;
  color: #6b7280;
}
a {
  color: #2563eb;
  text-decoration: none;
}
</style>
</head>

<body>
<div class="container">

  <div class="header">${TITLE}</div>

  <div class="status ${STATUS_CLASS}">
    ${STATUS_TEXT}
  </div>

  <div class="section">
    ${MESSAGE}
  </div>

  <div class="section">
    <div><span class="label">Job:</span> ${JOB_NAME}</div>
    <div><span class="label">Build:</span> #${BUILD_NUMBER}</div>
    <div><span class="label">Branch:</span> ${BRANCH}</div>
    <div><span class="label">Environment:</span> ${ENVIRONMENT}</div>
  </div>

  <div class="section">
    <a href="${BUILD_URL}">Open Jenkins Build</a>
  </div>

  <div class="footer">
    Microservice CI/CD Platform Notification
  </div>

</div>
</body>
</html>
