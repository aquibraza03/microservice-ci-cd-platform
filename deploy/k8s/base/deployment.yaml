apiVersion: apps/v1
kind: Deployment

metadata:
  name: ${SERVICE_NAME}
  namespace: ${K8S_NAMESPACE}

  labels:
    app: ${SERVICE_NAME}

spec:
  replicas: ${REPLICAS}

  selector:
    matchLabels:
      app: ${SERVICE_NAME}

  template:
    metadata:
      labels:
        app: ${SERVICE_NAME}

    spec:
      containers:
        - name: ${SERVICE_NAME}

          image: ${IMAGE_REGISTRY}/${SERVICE_NAME}:${IMAGE_TAG}

          imagePullPolicy: Always

          ports:
            - containerPort: ${CONTAINER_PORT}

          env:
            - name: SERVICE_NAME
              value: "${SERVICE_NAME}"

            - name: ENVIRONMENT
              value: "${ENVIRONMENT}"

          resources:
            requests:
              cpu: ${CPU_REQUEST}
              memory: ${MEMORY_REQUEST}

            limits:
              cpu: ${CPU_LIMIT}
              memory: ${MEMORY_LIMIT}

          readinessProbe:
            httpGet:
              path: ${HEALTH_PATH}
              port: ${CONTAINER_PORT}
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: ${HEALTH_PATH}
              port: ${CONTAINER_PORT}
            initialDelaySeconds: 30
            periodSeconds: 10
