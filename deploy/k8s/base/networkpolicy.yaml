apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: app
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: microservice-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: app

  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - podSelector: {}

  egress:
    # Allow same-namespace traffic
    - to:
        - podSelector: {}

    # Allow DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
