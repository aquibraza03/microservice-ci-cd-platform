apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - base/deployment.yaml
  - base/service.yaml
  - base/hpa.yaml
  - base/pdb.yaml
  - base/networkpolicy.yaml
  - base/serviceaccount.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: microservice-platform

commonAnnotations:
  platform.io/deployment-model: kustomize
  platform.io/compliance-tier: standard
