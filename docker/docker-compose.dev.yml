version: "3.9"

services:

  service:
    build:
      context: ${SERVICE_CONTEXT:-../services/${SERVICE_NAME}}
      dockerfile: ${DOCKERFILE_PATH:-Dockerfile}
    image: ${IMAGE_REGISTRY:-local}/${SERVICE_NAME}:${IMAGE_TAG:-dev}

    container_name: ${SERVICE_NAME}-dev

    ports:
      - "${SERVICE_PORT:-3000}:${CONTAINER_PORT:-3000}"

    environment:
      SERVICE_NAME: ${SERVICE_NAME}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_HOST: postgres
      REDIS_HOST: redis

    volumes:
      - ${SERVICE_CONTEXT:-../services/${SERVICE_NAME}}:/app

    depends_on:
      - postgres
      - redis

    networks:
      - platform-network


  postgres:
    image: postgres:${POSTGRES_VERSION:-15}

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
      POSTGRES_DB: ${POSTGRES_DB:-platform}

    volumes:
      - postgres-data:/var/lib/postgresql/data

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    networks:
      - platform-network


  redis:
    image: redis:${REDIS_VERSION:-7}

    ports:
      - "${REDIS_PORT:-6379}:6379"

    networks:
      - platform-network


networks:
  platform-network:
    driver: bridge


volumes:
  postgres-data:
